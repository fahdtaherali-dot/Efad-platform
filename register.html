<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيفاد | إنشاء حساب جديد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fbff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .login-box img { height: 70px; margin-bottom: 15px; }
        h2 { color: #102a43; margin-top: 0; margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; color: #333; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        .input-group input { width: 90%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Cairo'; font-size: 14px; outline: none; }
        .input-group input:focus { border-color: #27ae60; }
        .btn-login { background: #27ae60; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #219150; transform: translateY(-2px); }
        .login-link { display: block; margin-top: 15px; font-size: 14px; color: #666; }
        .login-link a { color: #2980b9; text-decoration: none; font-weight: bold; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-box">
        <img src="logo.png" alt="شعار إيفاد">
        <h2>انضم إلى إيفاد</h2>
        <p class="subtitle">خطوتك الأولى نحو أفضل جامعات العالم</p>

        <form action="index.html" method="GET">
            <div class="input-group">
                <label>الاسم الكامل</label>
                <input type="text" placeholder="مثال: فهد طاهر" required>
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" placeholder="example@gmail.com" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="btn-login">إنشاء حساب</button>
        </form>

        <div class="login-link">
            لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
        </div>
    </div>

</body>
</html>
